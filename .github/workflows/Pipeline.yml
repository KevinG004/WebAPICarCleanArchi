name: CI/CD Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  API_PROJECT: CarApiClean/CarApiClean.csproj
  TEST_PROJECT: TestGetById/TestGetById.csproj
  PUBLISH_FOLDER: ./publish
  ARTIFACT_NAME: car-api-artifact
  AZURE_WEBAPP_NAME: ${{ secrets.AZURE_WEBAPP_NAME }}

jobs:

  # ─────────────────────────────────────────────
  # JOB 1 : TEST
  # ─────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Download le code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Run les tests
        id: run_tests
        run: dotnet test ${{ env.TEST_PROJECT }} --verbosity normal

      - name: Envoyer une notification Discord si les tests ont échoué
        if: failure()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: failure
          title: "❌ Tests échoués"
          description: "Les tests ont échoué sur le commit `${{ github.sha }}` par **${{ github.actor }}**."
          color: 0xff0000

  # ─────────────────────────────────────────────
  # JOB 2 : BUILD (needs test)
  # ─────────────────────────────────────────────
  build:
    name: Build & Publish
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Download le code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build l'application
        run: dotnet build ${{ env.API_PROJECT }} --configuration Release

      - name: Publish l'application
        run: dotnet publish ${{ env.API_PROJECT }} --configuration Release -o ${{ env.PUBLISH_FOLDER }}

      - name: Créer un artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.PUBLISH_FOLDER }}

  # ─────────────────────────────────────────────
  # JOB 3 : DEPLOY (needs build)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Chercher l'artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.PUBLISH_FOLDER }}

      - name: Se connecter à Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Envoyer le code sur Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: ${{ env.PUBLISH_FOLDER }}
